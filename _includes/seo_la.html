<!-- Title -->
<title>{% if page.title %}{{ page.title | strip_html }} &#8211; {% endif %}{{ site.title | strip_html }}</title>

<link rel="dns-prefetch" href="//fonts.googleapis.com">
<link rel="dns-prefetch" href="//fonts.gstatic.com">
<link rel="dns-prefetch" href="//maxcdn.bootstrapcdn.com">
<link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
<meta name="description" content="{% if page.meta_description %}{{ page.meta_description | xml_escape }}{% elsif page.description %}{{ page.description | xml_escape }}{% else %}{{ site.description | xml_escape }}{% endif %}">

{% if page.meta_robots %}
<meta name="robots" content="{{ page.meta_robots }}">
{% else %}
<meta name="robots" content="all">
{% endif %}
<meta name="author" content="{{ site.data.author.name }}">
{% if site.fb_page %}
<meta property="fb:pages" content="{{ site.fb_page_id }}" />
{% endif %}
{% if page.categories %}
<meta name="keywords" content="{{ page.categories | join: ', ' }}">
{% endif %}
<link rel="canonical" href="{{ page.url | absolute_url }}">
<link rel="alternate" type="application/rss+xml" title="RSS Feed for {{ site.title }}" href="{{ "/feed.xml" | relative_url }}" />

<!-- Open Graph -->

<!-- From: https://github.com/mmistakes/hpstr-jekyll-theme/blob/master/_includes/head.html -->

<meta property="og:locale" content="{{ site.og_locale | default: "en_US" }}">
<meta property="og:type" content="article">
<meta property="og:title" content="{% if page.title %}{{ page.title | xml_escape }}{% else %}{{ site.title | xml_escape }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description | xml_escape }}{% else %}{{ site.description | xml_escape }}{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:site_name" content="{{ site.title | xml_escape }}">

{% if page.image %}
<meta property="og:image" content="{{ site.url }}{{ page.image }}"/>
<meta property="twitter:image" content="{{ site.url }}{{ page.image }}"/>
{% else %}
<meta property="og:image" content="{{ site.url }}{{ site.avatar }}"/>
<meta property="twitter:image" content="{{ site.url }}{{ site.avatar }}"/>
{% endif %}

<!-- Twitter Card -->
<meta name="twitter:card" content="@{{ site.data.author.twitter.card }}" />
{% if site.data.author.twitter.username %}
    <meta name="twitter:site" content="@{{ site.data.author.twitter.username }}" />
    <meta name="twitter:creator" content="@{{ site.data.author.twitter.username }}" />
{% endif %}

<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />

<!-- page description -->
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
<meta name="twitter:url" content="{{ site.url }}{{ page.url }}" />

{% if site.post_preview_image %}
<meta name="twitter:image" content="{{ site.url }}/images/me.jpeg" />
{% endif %}
